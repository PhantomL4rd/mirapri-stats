name: Backfill Trends

on:
  workflow_dispatch: # Manual trigger only

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Backfill usage trends
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_AUTH_TOKEN: ${{ secrets.WORKER_AUTH_TOKEN }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          RESPONSE=$(curl -sS -X POST "${WORKER_URL}/api/sync/backfill-trends" \
            -H "Authorization: Bearer ${WORKER_AUTH_TOKEN}" \
            -H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" \
            -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}" \
            -H "Content-Type: application/json")

          echo "Response: $RESPONSE"

          # Check success
          if echo "$RESPONSE" | jq -e '.success == true' > /dev/null 2>&1; then
            COMPUTED=$(echo "$RESPONSE" | jq -r '.computed')
            echo "Backfill complete: ${COMPUTED} trend rows computed"
          else
            echo "Backfill failed"
            exit 1
          fi
